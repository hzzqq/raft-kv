name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 600s

      - name: Test with race detector (kvraft + shardmaster)
        run: go test -race ./src/kvraft/ ./src/shardmaster/ -count=1 -timeout 600s

      - name: Test ShardKV with race detector (basic + move + concurrent + readindex)
        # GitHub runners have gcc, so -race runs here. The local managed Go env has
        # no gcc, so shardkv's concurrency is instead guarded by the high-frequency
        # churn-loop tests (TestSKVConcurrent/SnapshotChurn/ReMigration/ConfigProgress).
        # Here we race the single/multi-group migration goroutines (sendShard/fetchShard)
        # AND the concurrent + ReadIndex fast-path workloads to catch data races in the
        # migration state machine and the appliedIndex/ReadIndex read path.
        # (SnapshotChurn at maxraftstate>0 is heavier; kept out to limit CI time.)
        run: go test -race ./src/shardkv/ -run 'TestSKVBasic|TestSKVMove|TestSKVConcurrent|TestSKVReadIndex|TestChaosLeaderKillDuringMigration' -count=1 -timeout 600s

      - name: Test ShardKV SnapshotChurn with race detector (best-effort)
        # SnapshotChurn 走 maxraftstate>0 的快照压缩 + churn 路径，是 installSnapshot /
        # 快照恢复竞态的高价值目标。本地无 gcc 无法跑 -race，故放 CI 侧；标记为
        # continue-on-error：若暴露竞态则上报但不阻断流水线（避免未知竞态卡死 CI）。
        continue-on-error: true
        run: go test -race ./src/shardkv/ -run 'TestSKVSnapshotChurn' -count=1 -timeout 600s

  # 迁移冻结压测：专跑 ReMigration（A→B→A 漂移）+ ThreeGroupChurn（3 组整体再平衡），
  # 高 -count 放大冻结回归概率。冻结属 liveness/deadlock 问题，无需 -race 即可暴露
  # （此前曾在 3-group churn 下确定性挂死）。本地无 gcc，故放 CI 侧、常驻必过。
  migration-stress:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Migration stress (ReMigration + ThreeGroupChurn, -count=5)
        run: go test ./src/shardkv/ -run 'TestSKVReMigration|TestSKVThreeGroupChurn' -count=5 -timeout 900s

  # I17：混沌-竞态专项。把"迁移中杀主"的并发路径（sendShard/fetchShard/migratePump
  # 与 ReadIndex 快读、appliedIndex 并发读）放 -race 下跑，专门捕获迁移状态机与读
  # 路径的数据竞态。本地 managed Go 无 gcc，故放 CI 侧；continue-on-error 不阻断
  # 流水线——暴露竞态即上报。
  chaos-race:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Race detector on chaos + migration paths
        run: go test -race ./src/shardkv/ -run 'TestChaosLeaderKillDuringMigration|TestChaosLongRun|TestSKVReMigration|TestSKVThreeGroupChurn|TestSKVConfigProgress|TestSKVReadIndex|TestSKVLinearizableAppend' -count=1 -timeout 900s

  # I17b：raft 层 -race 专项。配合 cycle 90/20 #3 的 timerMu 修复，专门捕获
  # election/heartbeat Timer 并发改写等 raft 内部数据竞态。GitHub runner 有 gcc，
  # 本地 managed Go 无 gcc 故放 CI 侧；continue-on-error 不阻断流水线——暴露竞态即上报。
  raft-race:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Race detector on raft
        run: go test -race ./src/raft/ -count=1 -timeout 600s

  # I18：混沌长时 job。用 -count 放大"迁移中杀主 + 分片漂移 + 并发读"的 liveness
  # 回归概率（冻结/死锁属 liveness 问题，无需 -race 即可暴露）。常驻必过。
  chaos-long:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Chaos long run (amplified)
        run: go test ./src/shardkv/ -run 'TestChaosLongRun|TestSKVReMigration|TestSKVThreeGroupChurn|TestSKVConfigProgress|TestSKVReadIndex|TestSKVLinearizableAppend' -count=3 -timeout 1200s

  fullstack-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries (gateway / kvcli / demo)
        run: |
          mkdir -p bin
          go build -o bin/gateway ./src/gateway
          go build -o bin/kvcli   ./src/kvcli
          go build -o bin/demo    ./src/demo

      - name: Run demo (cluster -> HTTP gateway -> client full stack)
        run: go run ./src/demo

  # 静态检查：报告但不阻断流水线（continue-on-error）。
  # 对 6.824 起始代码里的历史写法保持宽容；想更严格就调 .golangci.yml。
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m

  # 覆盖率：跑全量测试，生成 cover.out 并上传为 artifact。
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test with coverage
        run: go test ./... -count=1 -timeout 900s -coverprofile=cover.out -covermode=atomic

      - name: Coverage summary
        run: go tool cover -func=cover.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
